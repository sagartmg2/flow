<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Installation Devices</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Source Sans Pro',Arial,sans-serif;font-size:13px;background:#ecf0f5;color:#333}
.content-wrapper{padding:15px}

/* BOX */
.box{background:#fff;border-top:3px solid #3c8dbc;border-radius:3px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.box-header{padding:10px 15px;border-bottom:1px solid #f4f4f4;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.box-title{font-size:16px;font-weight:600;color:#444;display:flex;align-items:center;gap:8px}
.box-body{padding:10px 15px 15px}
.box-header-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;font-size:12px;border-radius:3px;border:1px solid transparent;cursor:pointer;font-family:inherit;line-height:1.5;text-decoration:none;transition:background .15s;white-space:nowrap}
.btn-primary{background:#3c8dbc;color:#fff;border-color:#367fa9}.btn-primary:hover{background:#307095}
.btn-default{background:#fff;color:#444;border-color:#d2d6de}.btn-default:hover{background:#e8e8e8}
.btn-danger{background:#fff;color:#c0392b;border-color:#e0c0bc}.btn-danger:hover{background:#fdf2f2}
.btn-sm{padding:4px 9px;font-size:12px}
.btn-xs{padding:2px 7px;font-size:11px}
.action-sep{color:#ddd;margin:0 1px;user-select:none}

/* BADGES / LABELS */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;color:#fff}
.label-tag{display:inline-block;padding:2px 7px;border-radius:3px;font-size:11px;font-weight:600;border:1px solid}
.label-primary{background:#d9edf7;color:#2a6496;border-color:#bce8f1}
.label-muted{background:#f5f5f5;color:#777;border-color:#e0e0e0}
.label-danger{background:#fdf2f2;color:#c0392b;border-color:#f5c6cb}

/* VERIFICATION BADGES */
.vbadge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:3px;font-size:11px;font-weight:700;border:1px solid}
.vbadge-null{background:#fafafa;color:#aaa;border-color:#e0e0e0}
.vbadge-pending{background:#ebf4fb;color:#2a6496;border-color:#bce8f1}
.vbadge-verified{background:#f0f8ff;color:#1a5276;border-color:#aed6f1}
.vbadge-rejected{background:#fdf2f2;color:#c0392b;border-color:#f5c6cb}

/* EBS */
.ebs-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.ebs-synced{background:#3c8dbc}
.ebs-pending{background:#bbb}
.ebs-label{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700}
.ebs-label.synced{color:#3c8dbc}
.ebs-label.pending{color:#999}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:#f4f4f4;padding:7px 9px;border-bottom:2px solid #ddd;text-align:left;font-weight:700;color:#555;white-space:nowrap;font-size:11px;text-transform:uppercase;letter-spacing:.4px}
thead th.sortable{cursor:pointer;user-select:none}
thead th.sortable:hover{background:#ebebeb;color:#3c8dbc}
thead th .si{opacity:.4;font-size:10px;margin-left:2px}
thead th.asc .si::after{content:"▲"}
thead th.desc .si::after{content:"▼"}
thead th:not(.asc):not(.desc) .si::after{content:"⇅"}
tbody td{padding:6px 9px;border-bottom:1px solid #f4f4f4;vertical-align:middle}
tbody tr:hover{background:#f9fbfc}
tbody tr.row-sel{background:#ebf4fb}
tbody tr.row-removed td{opacity:.4}

/* CONTROLS */
.dt-controls{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.dt-left{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.dt-right{display:flex;align-items:center;gap:6px}
.dt-select,.dt-search,.filter-sel{padding:4px 8px;border:1px solid #d2d6de;border-radius:3px;font-size:12px;font-family:inherit;background:#fff;color:#333}
.dt-search{width:190px}
.dt-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;flex-wrap:wrap;gap:8px}
.dt-info{font-size:12px;color:#777}

/* PAGINATION */
.pag{display:flex;gap:2px}
.pag button{padding:3px 9px;border:1px solid #d2d6de;background:#fff;border-radius:3px;cursor:pointer;font-size:12px;color:#444}
.pag button.active{background:#3c8dbc;color:#fff;border-color:#3c8dbc}
.pag button:disabled{opacity:.4;cursor:default}
.pag button:not(.active):not(:disabled):hover{background:#f0f0f0}

/* BULK BAR */
.bulk-bar{background:#ebf4fb;border:1px solid #bce8f1;border-radius:3px;padding:6px 10px;display:flex;align-items:center;gap:8px;font-size:12px;color:#2a6496;margin-bottom:10px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:1000;overflow-y:auto}
.modal-box{background:#fff;border-radius:4px;width:100%;max-width:560px;border-top:3px solid #3c8dbc;box-shadow:0 5px 25px rgba(0,0,0,.25)}
.modal-box.wide{max-width:700px}
.modal-header{padding:12px 16px;border-bottom:1px solid #e5e5e5;display:flex;align-items:center;justify-content:space-between}
.modal-header h4{font-size:15px;font-weight:700;color:#444}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:#999;line-height:1;padding:0 2px}
.modal-close:hover{color:#444}
.modal-body{padding:16px}
.modal-footer{padding:10px 16px;border-top:1px solid #e5e5e5;display:flex;justify-content:flex-end;gap:8px}

/* FORM */
.form-group{margin-bottom:13px}
.form-group label{display:block;font-size:12px;font-weight:700;color:#555;margin-bottom:4px}
.req{color:#c0392b}
.form-control{width:100%;padding:6px 9px;border:1px solid #d2d6de;border-radius:3px;font-size:13px;font-family:inherit;transition:border .15s}
.form-control:focus{border-color:#3c8dbc;outline:none;box-shadow:0 0 0 2px rgba(60,141,188,.15)}
.form-control[disabled]{background:#f5f5f5;color:#999;cursor:not-allowed}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
small.hint{font-size:11px;color:#999;display:block;margin-top:3px}

/* STEP BAR */
.step-bar{display:flex;margin-bottom:16px;border-bottom:2px solid #e8e8e8}
.step-item{flex:1;text-align:center;padding:7px 4px;font-size:11px;font-weight:700;color:#aaa;border-bottom:2px solid transparent;margin-bottom:-2px;text-transform:uppercase;letter-spacing:.4px}
.step-item.active{color:#3c8dbc;border-bottom-color:#3c8dbc}
.step-item.done{color:#3c8dbc;border-bottom-color:#3c8dbc;opacity:.6}

/* INFO PANELS */
.info-panel{background:#ebf4fb;border:1px solid #bce8f1;border-radius:3px;padding:9px 12px;font-size:12px;color:#2a6496;margin-bottom:13px}
.info-panel.neutral{background:#fafafa;border-color:#e0e0e0;color:#666}
.info-panel.warn{background:#fff8f0;border-color:#f5c6a0;color:#8a4a00}
.info-panel.danger{background:#fdf2f2;border-color:#f5c6cb;color:#c0392b}

/* INHERIT CHIP */
.inherit-chip{display:inline-block;background:#d9edf7;color:#2a6496;border-radius:10px;padding:2px 9px;font-size:12px;font-weight:700;border:1px solid #bce8f1}

/* REVIEW TABLE */
.review-table{width:100%;border:1px solid #e8e8e8;border-radius:3px;overflow:hidden;border-collapse:collapse}
.review-table td{padding:5px 9px;font-size:12px;border-bottom:1px solid #f4f4f4}
.review-table tr:nth-child(even) td{background:#f9f9f9}
.review-label{color:#888;width:150px;vertical-align:top}
.review-val{font-weight:600;color:#333}

/* EBS SYNC MODAL */
.ebs-device-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border:1px solid #e0e0e0;border-radius:3px;margin-bottom:6px;background:#fafafa}
.ebs-device-item.missing{border-color:#f5c6cb;background:#fdf2f2}
.ebs-device-item.ok{border-color:#bce8f1;background:#ebf4fb}

/* VERIFY MODAL */
.ver-item{padding:8px 10px;border:1px solid #ddd;border-radius:3px;margin-bottom:8px;background:#fafafa}
.ver-item-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.ver-item-id{font-weight:700;color:#444;font-size:12px}
.ver-item-detail{font-size:11px;color:#777}
.ver-action-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;align-items:center}
.reject-input{flex:1;padding:4px 7px;border:1px solid #d2d6de;border-radius:3px;font-size:12px;font-family:inherit;min-width:120px}
.reject-input:focus{outline:none;border-color:#3c8dbc}

/* EMPTY */
.empty-state{text-align:center;padding:30px;color:#aaa;font-size:13px}

/* TOOLTIPS (title attr) */
[title]{cursor:help}

/* MONOSPACE */
.mono{font-family:monospace}
</style>
</head>
<body>
<div class="content-wrapper">
  <div class="box">
    <div class="box-header">
      <span class="box-title">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#3c8dbc" stroke-width="2.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        Installation Devices 
      </span>
      <div class="box-header-actions">
        <button class="btn btn-default btn-sm" id="btnSyncEbs">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
          Sync with EBS
        </button>
        <button class="btn btn-default btn-sm" id="btnVerify" style="display:none">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          Verify Pending
        </button>
        <button class="btn btn-primary btn-sm" id="btnAddDevice">&#43; Add Device</button>
      </div>
    </div>
    <div class="box-body">

      <div class="dt-controls">
        <div class="dt-left">
          <span style="font-size:12px;color:#666">Show</span>
          <select class="dt-select" id="perPage"><option>10</option><option>25</option><option>50</option></select>
          <span style="font-size:12px;color:#666">entries</span>
          <select class="dt-select filter-sel" id="filterStatus">
            <option value="">All Statuses</option>
            <option value="used">Used</option>
            <option value="removed">Removed</option>
          </select>
          <select class="dt-select filter-sel" id="filterEbs">
            <option value="">All EBS</option>
            <option value="synced">Synced</option>
            <option value="pending">Pending</option>
          </select>
          <select class="dt-select filter-sel" id="filterVer">
            <option value="">All Verification</option>
            <option value="null">Not Requested</option>
            <option value="pending">Pending</option>
            <option value="verified">Verified</option>
            <option value="rejected">Rejected</option>
          </select>
        </div>
        <div class="dt-right">
          <span style="font-size:12px;color:#666">Search:</span>
          <input type="text" class="dt-search" id="searchBox" placeholder="name, item code, CID…"/>
        </div>
      </div>

      <div id="bulkBar" class="bulk-bar" style="display:none">
        <span id="bulkCount" style="font-weight:600"></span>
        <button class="btn btn-default btn-xs" id="btnBulkRemove">&#x2715; Remove selected</button>
        <button class="btn btn-default btn-xs" id="btnBulkVerify">&#10003; Request Verification</button>
      </div>

      <div style="overflow-x:auto">
        <table id="devTable">
          <thead>
            <tr>
              <th style="width:30px"><input type="checkbox" id="checkAll"/></th>
              <th class="sortable" data-col="id">ID <span class="si"></span></th>
              <th class="sortable" data-col="sales_order_id">Sales Order <span class="si"></span></th>
              <th class="sortable" data-col="cid">CID <span class="si"></span></th>
              <th>Installation ID</th>
              <th>Item Code</th>
              <th class="sortable" data-col="product_name">Product Name <span class="si"></span></th>
              <th>Description</th>
              <th>Type</th>
              <th style="text-align:right">Unit</th>
              <th style="text-align:right">Price</th>
              <th style="text-align:right">Total</th>
              <th style="text-align:center">TSC</th>
              <th>Device Status</th>
              <th style="text-align:center">Recurring</th>
              <th>EBS Status</th>
              <th>Request ID</th>
              <th>Verification</th>
              <th>Req. By</th>
              <th>Verified By</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="devBody"></tbody>
        </table>
      </div>

      <div class="dt-footer">
        <div class="dt-info" id="dtInfo"></div>
        <div class="pag" id="dtPag"></div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modalOverlay" class="modal-overlay" style="display:none">
  <div class="modal-box" id="modalBox">
    <div class="modal-header">
      <h4 id="modalTitle">Modal</h4>
      <button class="modal-close" id="btnModalClose">&#x2715;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════════════
var installations = [
  {id:"INST-001", name:"Kathmandu Office — Floor 3", sales_order_id:2, cid:"R0325-K01-01"},
  {id:"INST-002", name:"Lalitpur Branch",             sales_order_id:4, cid:"R0325-K02-01"},
  {id:"INST-003", name:"Bhaktapur Hub",               sales_order_id:6, cid:"R0325-K03-01"},
];

// ebs_status of a device only applies to VERIFIED devices
// verification_status: null | pending | verified | rejected
var devices = [
  {id:5216, sales_order_id:null, cid:"R0325-K01-01", item_code:"1111",  product_name:"FTTE Installation",     description:"One Time Installation charge",               type:"sale",    unit:40, price:3000,   total:50000,  is_tsc_applicable:0, device_status:"used",    is_monthly_recurring:0, ebs_status:"synced",  installation_id:"INST-001", request_id:"REQ-001", verification_status:"verified",  requested_by:"admin",   verified_by:"supervisor", deleted_at:null},
  {id:5252, sales_order_id:null, cid:"R0325-K01-01", item_code:"22222", product_name:"INTR-320Mb-1M-S",       description:"320/320 Mbps Intranet Connectivity per month",type:"sale",    unit:1,  price:100000, total:100000, is_tsc_applicable:0, device_status:"used",    is_monthly_recurring:1, ebs_status:"pending", installation_id:"INST-001", request_id:"REQ-002", verification_status:"pending",   requested_by:"admin",   verified_by:null,         deleted_at:null},
  {id:5301, sales_order_id:null, cid:"R0325-K02-01", item_code:"3333",  product_name:"FTTE Maintenance",      description:"Monthly maintenance charge",                  type:"service", unit:1,  price:5000,   total:60000,  is_tsc_applicable:1, device_status:"used",    is_monthly_recurring:1, ebs_status:"synced",  installation_id:"INST-002", request_id:"REQ-003", verification_status:null,        requested_by:null,      verified_by:null,         deleted_at:null},
  {id:5310, sales_order_id:null, cid:"R0325-K02-01", item_code:"4444",  product_name:"Router Config",         description:"One-time router configuration",               type:"sale",    unit:1,  price:8000,   total:8000,   is_tsc_applicable:0, device_status:"removed", is_monthly_recurring:0, ebs_status:"pending", installation_id:"INST-002", request_id:null,      verification_status:"rejected",  requested_by:"admin",   verified_by:"supervisor", deleted_at:null},
];

var devices = [
  // ✅ ELIGIBLE — verification null + ebs pending
  {id:1001, sales_order_id:null, cid:"R0325-K01-01", item_code:"1001", product_name:"ONU Device A", description:"Fiber ONT unit", type:"sale", unit:1, price:5000, total:5000, is_tsc_applicable:0, device_status:"used", is_monthly_recurring:0, ebs_status:"pending", installation_id:"INST-001", request_id:null, verification_status:null, requested_by:null, verified_by:null, deleted_at:null},

  // ✅ ELIGIBLE — verification verified + ebs pending
  {id:1002, sales_order_id:null, cid:"R0325-K01-01", item_code:"1002", product_name:"ONU Device B", description:"Fiber ONT unit verified", type:"sale", unit:1, price:5000, total:5000, is_tsc_applicable:0, device_status:"used", is_monthly_recurring:0, ebs_status:"pending", installation_id:"INST-001", request_id:"REQ-010", verification_status:"verified", requested_by:"admin", verified_by:"supervisor", deleted_at:null},

  // ❌ NOT ELIGIBLE — verification pending (blocked)
  {id:1003, sales_order_id:null, cid:"R0325-K01-01", item_code:"1003", product_name:"ONU Device C", description:"Awaiting verifier", type:"sale", unit:1, price:5000, total:5000, is_tsc_applicable:0, device_status:"used", is_monthly_recurring:0, ebs_status:"pending", installation_id:"INST-001", request_id:"REQ-011", verification_status:"pending", requested_by:"admin", verified_by:null, deleted_at:null},

  // ❌ NOT ELIGIBLE — verification rejected + ebs pending
  {id:1004, sales_order_id:null, cid:"R0325-K02-01", item_code:"1004", product_name:"Router Config X", description:"Rejected by verifier", type:"sale", unit:1, price:8000, total:8000, is_tsc_applicable:0, device_status:"used", is_monthly_recurring:0, ebs_status:"pending", installation_id:"INST-002", request_id:"REQ-012", verification_status:"rejected", requested_by:"admin", verified_by:"supervisor", deleted_at:null},

  // ❌ NOT ELIGIBLE — already synced (nothing to push)
  {id:1005, sales_order_id:null, cid:"R0325-K02-01", item_code:"1005", product_name:"FTTE Install Y", description:"Already in EBS", type:"sale", unit:1, price:3000, total:3000, is_tsc_applicable:0, device_status:"used", is_monthly_recurring:0, ebs_status:"synced", installation_id:"INST-002", request_id:"REQ-013", verification_status:"verified", requested_by:"admin", verified_by:"supervisor", deleted_at:null},

  // ❌ NOT ELIGIBLE — already synced + verification null
  {id:1006, sales_order_id:null, cid:"R0325-K03-01", item_code:"1006", product_name:"Switch Config Z", description:"Synced, no verification", type:"service", unit:1, price:2000, total:2000, is_tsc_applicable:0, device_status:"used", is_monthly_recurring:0, ebs_status:"synced", installation_id:"INST-003", request_id:null, verification_status:null, requested_by:null, verified_by:null, deleted_at:null},
];

// Pending changes queue: changes waiting verifier approval
// { changeId, type: 'add'|'remove', deviceId, payload, requestedBy, timestamp }
var pendingChanges = [];
var nextId = 6000;
var nextChangeId = 1;
var CURRENT_USER = "admin";
var VERIFIER_USER = "supervisor"; // In real app this would come from auth

// Table state
var page=1, perPage=10, search="", filterStatus="", filterEbs="", filterVer="";
var sortCol="id", sortDir="asc";
var selected = new Set();

// ═══════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════
function N(n){ return Number(n).toLocaleString(); }
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function getInst(id){ return installations.find(function(i){return i.id===id;})||null; }
function getDevice(id){ return devices.find(function(d){return d.id===id;})||null; }

function canPushEbs(r){
  // Can push if: verified, OR verification not requested (null) - but NOT pending/rejected
  return (r.verification_status==="verified" || r.verification_status===null) && r.ebs_status==="pending";
}

function filtered(){
  var q = search.toLowerCase();
  return devices.filter(function(r){
    if(r.deleted_at) return false;
    if(filterStatus && r.device_status!==filterStatus) return false;
    if(filterEbs && r.ebs_status!==filterEbs) return false;
    if(filterVer){
      var v = filterVer==="null" ? null : filterVer;
      if(r.verification_status!==v) return false;
    }
    if(!q) return true;
    return (r.product_name+r.item_code+r.cid+(r.installation_id||"")+(r.request_id||"")).toLowerCase().indexOf(q)>-1;
  });
}

function sorted(arr){
  return arr.slice().sort(function(a,b){
    var va=a[sortCol], vb=b[sortCol];
    if(va==null) va="";
    if(vb==null) vb="";
    if(typeof va==="string") va=va.toLowerCase();
    if(typeof vb==="string") vb=vb.toLowerCase();
    return sortDir==="asc"?(va>vb?1:va<vb?-1:0):(va<vb?1:va>vb?-1:0);
  });
}

function ebsHtml(r){
  if(r.ebs_status==="synced") return '<span class="ebs-label synced"><span class="ebs-dot ebs-synced"></span>Synced</span>';
  return '<span class="ebs-label pending"><span class="ebs-dot ebs-pending"></span>Pending</span>';
}

function statusHtml(s){
  if(s==="removed") return '<span class="label-tag label-danger">Removed</span>';
  return '<span class="label-tag label-primary">Used</span>';
}

function verHtml(r){
  var vs = r.verification_status;
  if(vs===null)       return '<span class="vbadge vbadge-null">Not Requested</span>';
  if(vs==="pending")  return '<span class="vbadge vbadge-pending">⏳ Pending</span>';
  if(vs==="verified") return '<span class="vbadge vbadge-verified">✓ Verified</span>';
  if(vs==="rejected") return '<span class="vbadge vbadge-rejected">✗ Rejected</span>';
  return "";
}

function countPendingVer(){
  return devices.filter(function(d){return d.verification_status==="pending" && !d.deleted_at;}).length;
}

function updateVerifyBtn(){
  var n = countPendingVer();
  var btn = document.getElementById("btnVerify");
  if(n>0){ btn.style.display="inline-flex"; btn.innerHTML='<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg> Verify Pending <span class="badge" style="background:#3c8dbc;color:#fff;padding:1px 6px;border-radius:8px;font-size:10px">'+n+'</span>'; }
  else btn.style.display="none";
}

// ═══════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════
function render(){
  var data = sorted(filtered());
  var total = data.length;
  var start = (page-1)*perPage;
  var slice = data.slice(start, start+perPage);

  var html = slice.map(function(r){
    var inst = getInst(r.installation_id);
    var instCell = r.installation_id
      ? '<span style="font-size:11px;font-weight:600;color:#3c8dbc">'+r.installation_id+'</span>'
        +(inst?'<div style="font-size:10px;color:#aaa;margin-top:1px">'+inst.name+'</div>':'')
      : '<span style="color:#bbb;font-size:11px">—</span>';
    var soCell = r.sales_order_id
      ? '<span class="inherit-chip" style="font-size:11px">SO-'+r.sales_order_id+'</span>'
      : '<span style="color:#bbb;font-size:11px">null</span>';
    var reqCell = r.request_id
      ? '<span class="mono" style="font-size:11px">'+r.request_id+'</span>'
      : '<span style="color:#bbb;font-size:11px">—</span>';
    var reqByCell = r.requested_by||'<span style="color:#bbb;font-size:11px">—</span>';
    var verByCell = r.verified_by||'<span style="color:#bbb;font-size:11px">—</span>';

    // Actions
    var actions = [];
    // Remove action: only if not already removed AND (not pending verification or null)
    if(r.device_status!=="removed"){
      if(r.verification_status===null){
        // Can remove directly, goes to pending verification
        actions.push('<button class="btn btn-xs btn-danger" onclick="requestRemove('+r.id+')">Remove</button>');
      } else if(r.verification_status==="pending"){
        actions.push('<button class="btn btn-xs btn-danger" onclick="requestRemove('+r.id+')" disabled title="Verification in progress">Remove</button>');
      } else if(r.verification_status==="verified"){
        actions.push('<button class="btn btn-xs btn-danger" onclick="requestRemove('+r.id+')">Remove</button>');
      } else if(r.verification_status==="rejected"){
        actions.push('<button class="btn btn-xs btn-danger" onclick="requestRemove('+r.id+')">Remove</button>');
      }
    }
    // Push to EBS
    if(canPushEbs(r)){
      actions.push('<button class="btn btn-xs btn-default" onclick="pushEbs('+r.id+')" title="Push to EBS" style="color:#3c8dbc;border-color:#bce8f1">→ EBS</button>');
    }
    // Request verification (if null or rejected)
    if(r.verification_status===null || r.verification_status==="rejected"){
      actions.push('<button class="btn btn-xs btn-default" onclick="requestVerification(['+r.id+'])" title="Request Verification">Request Verify</button>');
    }

    var isRemoved = r.device_status==="removed";
    return '<tr class="'+(selected.has(r.id)?"row-sel":"")+(isRemoved?" row-removed":"")+'">'
      +'<td><input type="checkbox" class="rowChk" data-id="'+r.id+'" '+(selected.has(r.id)?"checked":"")+'/></td>'
      +'<td style="font-weight:700;color:#555">'+r.id+'</td>'
      +'<td>'+soCell+'</td>'
      +'<td class="mono" style="font-size:11px;color:#666">'+r.cid+'</td>'
      +'<td>'+instCell+'</td>'
      +'<td class="mono" style="font-size:11px;color:#888">'+r.item_code+'</td>'
      +'<td style="font-weight:600;color:#333;max-width:140px">'+esc(r.product_name)+'</td>'
      +'<td style="font-size:11px;color:#888;max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="'+esc(r.description)+'">'+esc(r.description)+'</td>'
      +'<td><span class="label-tag label-muted">'+r.type+'</span></td>'
      +'<td style="text-align:right">'+r.unit+'</td>'
      +'<td style="text-align:right" class="mono">'+N(r.price)+'</td>'
      +'<td style="text-align:right;font-weight:700" class="mono">'+N(r.total)+'</td>'
      +'<td style="text-align:center">'+(r.is_tsc_applicable?'<span style="color:#3c8dbc;font-weight:700;font-size:12px">Yes</span>':'<span style="color:#ccc;font-size:11px">No</span>')+'</td>'
      +'<td>'+statusHtml(r.device_status)+'</td>'
      +'<td style="text-align:center">'+(r.is_monthly_recurring?'<span style="color:#3c8dbc;font-weight:700;font-size:12px">Yes</span>':'<span style="color:#ccc;font-size:11px">No</span>')+'</td>'
      +'<td>'+ebsHtml(r)+'</td>'
      +'<td>'+reqCell+'</td>'
      +'<td>'+verHtml(r)+'</td>'
      +'<td style="font-size:11px;color:#666">'+reqByCell+'</td>'
      +'<td style="font-size:11px;color:#666">'+verByCell+'</td>'
      +'<td style="white-space:nowrap">'+(actions.join('<span class="action-sep">|</span>'))+'</td>'
      +'</tr>';
  }).join("");

  document.getElementById("devBody").innerHTML = html || '<tr><td colspan="21" class="empty-state">No records found</td></tr>';

  var s=start+1, e=Math.min(start+perPage,total);
  document.getElementById("dtInfo").textContent = total ? "Showing "+s+" to "+e+" of "+total+" entries" : "No matching records";
  renderPag(Math.ceil(total/perPage));

  var allCheck = slice.length && slice.every(function(r){return selected.has(r.id);});
  document.getElementById("checkAll").checked = allCheck;
  updateBulk();
  updateSortHeaders();
  updateVerifyBtn();
}

function renderPag(pages){
  var pag = document.getElementById("dtPag");
  if(pages<=1){pag.innerHTML="";return;}
  var h = '<button onclick="goPage('+(Math.max(1,page-1))+')" '+(page===1?"disabled":"")+'>&#8249;</button>';
  for(var i=1;i<=pages;i++) h += '<button class="'+(i===page?"active":"")+'" onclick="goPage('+i+')">'+i+'</button>';
  h += '<button onclick="goPage('+(Math.min(pages,page+1))+')" '+(page===pages?"disabled":"")+'>&#8250;</button>';
  pag.innerHTML = h;
}
function goPage(p){page=p;render();}

function updateSortHeaders(){
  document.querySelectorAll("thead th.sortable").forEach(function(th){
    th.classList.remove("asc","desc");
    if(th.dataset.col===sortCol) th.classList.add(sortDir);
  });
}

function updateBulk(){
  var bar = document.getElementById("bulkBar");
  if(selected.size>0){
    bar.style.display="flex";
    document.getElementById("bulkCount").textContent = selected.size+" device(s) selected";
  } else {
    bar.style.display="none";
  }
}

// ═══════════════════════════════════════════════════════
//  EVENTS
// ═══════════════════════════════════════════════════════
document.getElementById("checkAll").addEventListener("change",function(){
  var data = sorted(filtered()).slice((page-1)*perPage, page*perPage);
  data.forEach(function(r){ this.checked ? selected.add(r.id) : selected.delete(r.id); }, this);
  render();
});
document.getElementById("devBody").addEventListener("change",function(e){
  if(!e.target.classList.contains("rowChk")) return;
  var id = +e.target.dataset.id;
  e.target.checked ? selected.add(id) : selected.delete(id);
  updateBulk();
  e.target.closest("tr").classList.toggle("row-sel", e.target.checked);
});
document.getElementById("perPage").addEventListener("change",function(){perPage=+this.value;page=1;render();});
document.getElementById("searchBox").addEventListener("input",function(){search=this.value;page=1;render();});
document.getElementById("filterStatus").addEventListener("change",function(){filterStatus=this.value;page=1;render();});
document.getElementById("filterEbs").addEventListener("change",function(){filterEbs=this.value;page=1;render();});
document.getElementById("filterVer").addEventListener("change",function(){filterVer=this.value;page=1;render();});

document.querySelectorAll("thead th.sortable").forEach(function(th){
  th.addEventListener("click",function(){
    var col=this.dataset.col;
    if(sortCol===col) sortDir=sortDir==="asc"?"desc":"asc";
    else{sortCol=col;sortDir="asc";}
    render();
  });
});

document.getElementById("btnBulkRemove").addEventListener("click",function(){
  var ids = Array.from(selected);
  if(!ids.length) return;
  openConfirmRemove(ids);
});
document.getElementById("btnBulkVerify").addEventListener("click",function(){
  var ids = Array.from(selected);
  if(!ids.length) return;
  requestVerification(ids);
});

// ═══════════════════════════════════════════════════════
//  MODAL UTILS
// ═══════════════════════════════════════════════════════
function showModal(wide){
  document.getElementById("modalOverlay").style.display="flex";
  document.getElementById("modalBox").className = wide ? "modal-box wide" : "modal-box";
}
function hideModal(){
  document.getElementById("modalOverlay").style.display="none";
  draftDev = {};
}
function setModal(title,body,footer){
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalBody").innerHTML = body;
  document.getElementById("modalFooter").innerHTML = footer;
}
document.getElementById("btnModalClose").addEventListener("click",hideModal);
document.getElementById("modalOverlay").addEventListener("click",function(e){
  if(e.target===this) hideModal();
});

// ═══════════════════════════════════════════════════════
//  ADD DEVICE (3-step)
// ═══════════════════════════════════════════════════════
var draftDev = {};
document.getElementById("btnAddDevice").addEventListener("click",function(){draftDev={};openStep1();showModal(false);});

function stepBar(active){
  var labels=["Installation","Device Info","Review"];
  return '<div class="step-bar">'+labels.map(function(l,i){
    var n=i+1, cls=n<active?"done":n===active?"active":"";
    return '<div class="step-item '+cls+'">'+(n<active?"✓ ":n+". ")+l+'</div>';
  }).join("")+'</div>';
}

function openStep1(){
  var opts = installations.map(function(i){
    return '<option value="'+i.id+'">'+esc(i.id)+' — '+esc(i.name)+'</option>';
  }).join("");
  var body = stepBar(1)
    +'<div class="info-panel">Select the installation this device belongs to. Sales Order will be <strong>null</strong> by default — a new device is not assigned to a Sales Order automatically.</div>'
    +'<div class="form-group"><label>Installation <span class="req">*</span></label>'
    +'<select class="form-control" id="s1Inst"><option value="">— select —</option>'+opts+'</select></div>'
    +'<div id="s1Preview"></div>';
  setModal("Add Device — Step 1 of 3", body,
    '<button class="btn btn-default" id="s1Cancel">Cancel</button>'
    +'<button class="btn btn-primary" id="s1Next">Next &rarr;</button>');
  document.getElementById("s1Cancel").addEventListener("click",hideModal);
  document.getElementById("s1Inst").addEventListener("change",function(){
    var inst = installations.find(function(i){return i.id===this.value;},this);
    var prev = document.getElementById("s1Preview");
    if(inst){
      prev.innerHTML='<div class="info-panel" style="margin-top:0">'
        +'<strong>'+esc(inst.name)+'</strong><br>'
        +'CID: <code style="font-size:12px">'+inst.cid+'</code>'
        +' &nbsp; Sales Order: <span style="color:#888;font-size:12px">null (not assigned)</span></div>';
      draftDev.installation_id = inst.id;
      draftDev.cid = inst.cid;
      draftDev.inst_name = inst.name;
    } else {
      prev.innerHTML="";
      delete draftDev.installation_id;
    }
  });
  // restore selection if coming back
  if(draftDev.installation_id){
    setTimeout(function(){
      var el = document.getElementById("s1Inst");
      if(el){ el.value=draftDev.installation_id; el.dispatchEvent(new Event("change")); }
    },0);
  }
  document.getElementById("s1Next").addEventListener("click",function(){
    if(!draftDev.installation_id){alert("Please select an installation.");return;}
    openStep2();
  });
}

function openStep2(){
  var body = stepBar(2)
    +'<div class="info-panel">'
    +'Installation: <strong>'+draftDev.installation_id+'</strong> — '+esc(draftDev.inst_name)
    +' &nbsp;|&nbsp; CID: <code style="font-size:12px">'+draftDev.cid+'</code>'
    +' &nbsp;|&nbsp; Sales Order: <span style="color:#888">null</span></div>'
    +'<div class="form-row">'
    +'<div class="form-group"><label>Item Code <span class="req">*</span></label><input class="form-control" id="f_ic" placeholder="e.g. 7777" value="'+esc(draftDev.item_code||"")+'"/></div>'
    +'<div class="form-group"><label>Type</label><select class="form-control" id="f_type"><option '+(draftDev.type==="service"?"":"selected")+'>sale</option><option '+(draftDev.type==="service"?"selected":"")+'>service</option></select></div>'
    +'</div>'
    +'<div class="form-group"><label>Product Name <span class="req">*</span></label><input class="form-control" id="f_pn" placeholder="e.g. ONU Device X" value="'+esc(draftDev.product_name||"")+'"/></div>'
    +'<div class="form-group"><label>Description</label><input class="form-control" id="f_desc" placeholder="Short description" value="'+esc(draftDev.description||"")+'"/></div>'
    +'<div class="form-row-3">'
    +'<div class="form-group"><label>Unit</label><input class="form-control" id="f_unit" type="number" value="'+(draftDev.unit!=null?draftDev.unit:1)+'"/></div>'
    +'<div class="form-group"><label>Price</label><input class="form-control" id="f_price" type="number" value="'+(draftDev.price||0)+'"/></div>'
    +'<div class="form-group"><label>Total</label><input class="form-control" id="f_total" type="number" value="'+(draftDev.total||0)+'"/></div>'
    +'</div>'
    +'<div class="form-row">'
    +'<div class="form-group"><label>TSC Applicable</label><select class="form-control" id="f_tsc"><option value="0" '+(draftDev.is_tsc_applicable?"":"selected")+'>No</option><option value="1" '+(draftDev.is_tsc_applicable?"selected":"")+'>Yes</option></select></div>'
    +'<div class="form-group"><label>Monthly Recurring</label><select class="form-control" id="f_rec"><option value="0" '+(draftDev.is_monthly_recurring?"":"selected")+'>No</option><option value="1" '+(draftDev.is_monthly_recurring?"selected":"")+'>Yes</option></select></div>'
    +'</div>'
    +'<div class="form-group"><label>Request ID <small style="font-weight:400;color:#aaa">(optional)</small></label><input class="form-control" id="f_req" placeholder="e.g. REQ-005" value="'+esc(draftDev.request_id||"")+'"/></div>';
  setModal("Add Device — Step 2 of 3", body,
    '<button class="btn btn-default" id="s2Back">&larr; Back</button>'
    +'<button class="btn btn-primary" id="s2Next">Review &rarr;</button>');
  document.getElementById("s2Back").addEventListener("click",openStep1);
  document.getElementById("s2Next").addEventListener("click",function(){
    var ic = document.getElementById("f_ic").value.trim();
    var pn = document.getElementById("f_pn").value.trim();
    if(!ic||!pn){alert("Item code and product name are required.");return;}
    draftDev.item_code = ic;
    draftDev.product_name = pn;
    draftDev.description = document.getElementById("f_desc").value.trim();
    draftDev.type = document.getElementById("f_type").value;
    draftDev.unit = +document.getElementById("f_unit").value;
    draftDev.price = +document.getElementById("f_price").value;
    draftDev.total = +document.getElementById("f_total").value;
    draftDev.is_tsc_applicable = +document.getElementById("f_tsc").value;
    draftDev.is_monthly_recurring = +document.getElementById("f_rec").value;
    draftDev.request_id = document.getElementById("f_req").value.trim()||null;
    openStep3();
  });
}

function openStep3(){
  var rows=[
    ["Installation", draftDev.installation_id+" — "+draftDev.inst_name],
    ["CID", '<code>'+draftDev.cid+'</code>'],
    ["Sales Order", '<span style="color:#888;font-size:12px">null — not assigned</span>'],
    ["Item Code", draftDev.item_code],
    ["Product Name", esc(draftDev.product_name)],
    ["Description", esc(draftDev.description)||"—"],
    ["Type", draftDev.type],
    ["Unit", draftDev.unit],
    ["Price", N(draftDev.price)],
    ["Total", N(draftDev.total)],
    ["TSC Applicable", draftDev.is_tsc_applicable?"Yes":"No"],
    ["Monthly Recurring", draftDev.is_monthly_recurring?"Yes":"No"],
    ["Request ID", draftDev.request_id||"—"],
    ["Verification", '<span class="vbadge vbadge-null">Not Requested</span>'],
    ["EBS Status", '<span class="ebs-label pending"><span class="ebs-dot ebs-pending"></span>Pending</span>'],
  ];
  var tableHtml = rows.map(function(r){
    return '<tr><td class="review-label">'+r[0]+'</td><td class="review-val">'+r[1]+'</td></tr>';
  }).join("");
  var body = stepBar(3)
    +'<div class="info-panel neutral" style="margin-bottom:13px">Review all details before saving. After saving, you can request verification. <strong>Changes will only be applied after verifier approval.</strong></div>'
    +'<table class="review-table">'+tableHtml+'</table>';
  setModal("Add Device — Confirm", body,
    '<button class="btn btn-default" id="s3Back">&larr; Back</button>'
    +'<button class="btn btn-primary" id="s3Save">Save Device</button>');
  document.getElementById("s3Back").addEventListener("click",openStep2);
  document.getElementById("s3Save").addEventListener("click",function(){
    var newDev = {
      id: nextId++,
      sales_order_id: null,
      cid: draftDev.cid,
      item_code: draftDev.item_code,
      product_name: draftDev.product_name,
      description: draftDev.description,
      type: draftDev.type,
      unit: draftDev.unit,
      price: draftDev.price,
      total: draftDev.total,
      is_tsc_applicable: draftDev.is_tsc_applicable,
      device_status: "used",
      is_monthly_recurring: draftDev.is_monthly_recurring,
      ebs_status: "pending",
      installation_id: draftDev.installation_id,
      request_id: draftDev.request_id,
      verification_status: null,
      requested_by: null,
      verified_by: null,
      deleted_at: null
    };
    devices.push(newDev);
    hideModal();
    render();
    // Ask if they want to immediately request verification
    setTimeout(function(){
      if(confirm("Device #"+newDev.id+" saved. Send for verification now?")){
        requestVerification([newDev.id]);
      }
    },100);
  });
}

// ═══════════════════════════════════════════════════════
//  REMOVE (with verification)
// ═══════════════════════════════════════════════════════
function requestRemove(id){
  var r = getDevice(id);
  if(!r) return;
  openConfirmRemove([id]);
}

function openConfirmRemove(ids){
  var devList = ids.map(function(id){
    var r = getDevice(id);
    return r ? '<li style="margin-bottom:4px"><strong>#'+r.id+'</strong> — '+esc(r.product_name)+'</li>' : '';
  }).join("");
  var body = '<div class="info-panel warn" style="margin-bottom:13px">'
    +'Removing a device requires verifier approval. The device will be marked <strong>pending verification</strong> until the verifier approves or rejects.</div>'
    +'<p style="font-size:12px;margin-bottom:10px;color:#555">The following device(s) will be submitted for removal verification:</p>'
    +'<ul style="font-size:12px;padding-left:18px;margin-bottom:0">'+devList+'</ul>';
  setModal("Request Device Removal", body,
    '<button class="btn btn-default" id="rmCancel">Cancel</button>'
    +'<button class="btn btn-primary" id="rmConfirm">Submit for Verification</button>');
  showModal(false);
  document.getElementById("rmCancel").addEventListener("click",hideModal);
  document.getElementById("rmConfirm").addEventListener("click",function(){
    ids.forEach(function(id){
      var r = getDevice(id);
      if(r){
        r.verification_status="pending";
        r.requested_by = CURRENT_USER;
        pendingChanges.push({
          changeId: nextChangeId++,
          type:"remove",
          deviceId: id,
          requestedBy: CURRENT_USER,
          timestamp: new Date().toISOString()
        });
      }
    });
    selected.clear();
    hideModal();
    render();
  });
}

// ═══════════════════════════════════════════════════════
//  REQUEST VERIFICATION for add
// ═══════════════════════════════════════════════════════
function requestVerification(ids){
  var eligible = ids.filter(function(id){
    var r = getDevice(id);
    return r && (r.verification_status===null || r.verification_status==="rejected");
  });
  if(!eligible.length){ alert("No eligible devices (already pending or verified)."); return; }
  eligible.forEach(function(id){
    var r = getDevice(id);
    if(r){
      r.verification_status = "pending";
      r.requested_by = CURRENT_USER;
    }
  });
  selected.clear();
  render();
  alert("Verification requested for "+eligible.length+" device(s). Waiting for verifier approval.");
}

// ═══════════════════════════════════════════════════════
//  VERIFY (Verifier panel)
// ═══════════════════════════════════════════════════════
document.getElementById("btnVerify").addEventListener("click",openVerifyPanel);

function openVerifyPanel(){
  var pending = devices.filter(function(d){return d.verification_status==="pending" && !d.deleted_at;});
  if(!pending.length){alert("No pending verifications.");return;}

  var itemsHtml = pending.map(function(r){
    return '<div class="ver-item" data-id="'+r.id+'">'
      +'<div class="ver-item-header">'
      +'<span class="ver-item-id">#'+r.id+' — '+esc(r.product_name)+'</span>'
      +'<span class="vbadge vbadge-pending">⏳ Pending</span>'
      +'</div>'
      +'<div class="ver-item-detail">Installation: '+r.installation_id+' | CID: '+r.cid+' | Item: '+r.item_code+' | Req. by: '+(r.requested_by||"—")+'</div>'
      +'<div class="ver-action-row">'
      +'<button class="btn btn-xs btn-primary ver-approve" data-id="'+r.id+'">✓ Approve</button>'
      +'<input class="reject-input" id="rejectReason_'+r.id+'" placeholder="Rejection reason (optional)"/>'
      +'<button class="btn btn-xs btn-danger ver-reject" data-id="'+r.id+'">✗ Reject</button>'
      +'</div>'
      +'</div>';
  }).join("");

  var body = '<div class="info-panel" style="margin-bottom:13px">Review pending verification requests. Approved changes will take effect immediately. Rejected items will notify the requester.</div>'
    +'<div id="verList">'+itemsHtml+'</div>';
  setModal("Verify Pending Changes", body,
    '<button class="btn btn-default" id="verDone">Close</button>');
  showModal(true);

  document.getElementById("verDone").addEventListener("click",hideModal);
  document.getElementById("modalBody").addEventListener("click",function(e){
    if(e.target.classList.contains("ver-approve")){
      var id = +e.target.dataset.id;
      approveDevice(id);
      e.target.closest(".ver-item").remove();
      if(!document.querySelector(".ver-item")){
        document.getElementById("verList").innerHTML='<div class="empty-state">All verifications processed.</div>';
      }
    }
    if(e.target.classList.contains("ver-reject")){
      var id = +e.target.dataset.id;
      var reason = document.getElementById("rejectReason_"+id);
      rejectDevice(id, reason?reason.value:"");
      e.target.closest(".ver-item").remove();
      if(!document.querySelector(".ver-item")){
        document.getElementById("verList").innerHTML='<div class="empty-state">All verifications processed.</div>';
      }
    }
  });
}

function approveDevice(id){
  var r = getDevice(id);
  if(!r) return;
  // Check if this was a remove request
  var removeChange = pendingChanges.find(function(c){return c.deviceId===id && c.type==="remove";});
  if(removeChange){
    r.device_status = "removed";
    pendingChanges = pendingChanges.filter(function(c){return !(c.deviceId===id && c.type==="remove");});
  }
  r.verification_status = "verified";
  r.verified_by = VERIFIER_USER;
  render();
}

function rejectDevice(id, reason){
  var r = getDevice(id);
  if(!r) return;
  // Remove the pending change if it was a remove
  pendingChanges = pendingChanges.filter(function(c){return !(c.deviceId===id && c.type==="remove");});
  r.verification_status = "rejected";
  r.verified_by = VERIFIER_USER;
  render();
}

// ═══════════════════════════════════════════════════════
//  EBS PUSH
// ═══════════════════════════════════════════════════════
function pushEbs(id){
  var r = getDevice(id);
  if(!r || !canPushEbs(r)) return;
  r.ebs_status = "synced";
  render();
}

// ═══════════════════════════════════════════════════════
//  EBS SYNC (check EBS for missing devices)
// ═══════════════════════════════════════════════════════
document.getElementById("btnSyncEbs").addEventListener("click",openEbsSync);

// Simulated EBS data — these are devices EBS knows about for each CID
// Some exist in our system, some don't (to trigger warnings)
var ebsDevices = [
  {ebs_id:"EBS-001", cid:"R0325-K01-01", item_code:"1111",  product_name:"FTTE Installation",       synced:true},
  {ebs_id:"EBS-002", cid:"R0325-K01-01", item_code:"22222", product_name:"INTR-320Mb-1M-S",         synced:true},
  {ebs_id:"EBS-003", cid:"R0325-K01-01", item_code:"88888", product_name:"EBS-Only VLAN Setup",     synced:false}, // NOT in our system
  {ebs_id:"EBS-004", cid:"R0325-K02-01", item_code:"3333",  product_name:"FTTE Maintenance",        synced:true},
  {ebs_id:"EBS-005", cid:"R0325-K02-01", item_code:"4444",  product_name:"Router Config",           synced:true},
  {ebs_id:"EBS-006", cid:"R0325-K02-01", item_code:"99999", product_name:"EBS-Only Firewall Config",synced:false}, // NOT in our system
];

function openEbsSync(){
  // Find EBS devices not present in our system (by item_code + cid combo)
  var missing = ebsDevices.filter(function(e){
    return !e.synced && !devices.find(function(d){
      return d.item_code===e.item_code && d.cid===e.cid && !d.deleted_at;
    });
  });
  // Find our devices that can be synced (verified/null, pending EBS)
  var syncable = devices.filter(function(d){
    return !d.deleted_at && canPushEbs(d);
  });

  var missingHtml = missing.length
    ? '<div class="info-panel danger" style="margin-bottom:12px">'
      +'<strong>⚠ Warning:</strong> '+missing.length+' device(s) exist in EBS for this CID but are <strong>not found</strong> in this system. Please review:</div>'
      +missing.map(function(e){
        return '<div class="ebs-device-item missing">'
          +'<div><div style="font-size:12px;font-weight:700;color:#c0392b">'+e.ebs_id+' — '+esc(e.product_name)+'</div>'
          +'<div style="font-size:11px;color:#888">Item Code: '+e.item_code+' | CID: '+e.cid+'</div></div>'
          +'<span class="label-tag label-danger" style="font-size:11px">Not in system</span>'
          +'</div>';
      }).join("")
    : '<div class="info-panel" style="margin-bottom:12px">✓ No missing devices detected in EBS.</div>';

  var syncableHtml = syncable.length
    ? '<p style="font-size:12px;font-weight:700;color:#555;margin:12px 0 8px">Devices ready to sync to EBS ('+syncable.length+'):</p>'
      +syncable.map(function(d){
        return '<div class="ebs-device-item ok">'
          +'<div><div style="font-size:12px;font-weight:700;color:#2a6496">#'+d.id+' — '+esc(d.product_name)+'</div>'
          +'<div style="font-size:11px;color:#888">'+d.installation_id+' | '+d.cid+' | Verification: '+(d.verification_status||"null")+'</div></div>'
          +'<button class="btn btn-xs btn-primary" onclick="pushEbsFromSync('+d.id+')">→ Push</button>'
          +'</div>';
      }).join("")
    : '<div class="info-panel neutral">No devices currently eligible for EBS push.</div>';

  var body = missingHtml + syncableHtml;
  setModal("Sync with EBS", body,
    '<button class="btn btn-default" id="ebsSyncClose">Close</button>'
    +(syncable.length ? '<button class="btn btn-primary" id="ebsPushAll">Push All Eligible</button>' : ''));
  showModal(true);
  document.getElementById("ebsSyncClose").addEventListener("click",function(){hideModal();render();});
  var pushAll = document.getElementById("ebsPushAll");
  if(pushAll){
    pushAll.addEventListener("click",function(){
      syncable.forEach(function(d){d.ebs_status="synced";});
      hideModal();
      render();
    });
  }
}

function pushEbsFromSync(id){
  var r = getDevice(id);
  if(!r || !canPushEbs(r)) return;
  r.ebs_status = "synced";
  // Re-render sync modal inline
  var btn = document.querySelector('[onclick="pushEbsFromSync('+id+')"]');
  if(btn){
    var item = btn.closest(".ebs-device-item");
    if(item){
      btn.textContent="Synced";
      btn.disabled=true;
      btn.className="btn btn-xs btn-default";
      item.querySelector("div div:first-child div:first-child").style.color="#3c8dbc";
    }
  }
}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
render();
</script>
